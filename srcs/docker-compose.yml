version: '3.8'
services:
  nginx:
    container_name: nginx-cont
    image: nginx-try:packaged
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    ports: 
      - "443:443"
    expose:
      - "9000"
    networks:
      - net
  wordpress:
    container_name: wp-cont
    image: wp-try:packaged
    build:
      contex: ./requirements/nginx
      dockerfile: Dockerfile
    networks:
      - net
networks:
  net:
    driver: bridge
